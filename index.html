/* ===================== LOCALSTORAGE ===================== */
function loadLS(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch (e) { return fallback; }
}
function saveLS(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
}

/* ===================== TEXTO TICKET (para WhatsApp / guardar / imprimir) ===================== */
function generarTextoTicket(partidas, tier, mults, modoMargen, refPedido) {
  const pv = (p) => (p.esFijo ? p.precioFijo : precio(p.costo, mults[tier], modoMargen));
  const total = partidas.reduce((s, p) => s + pv(p), 0);
  let t = `*EL MERCHENARIO*\n`;
  if (refPedido) t += `📌 ${refPedido}\n`;
  t += `🗓️ ${new Date().toLocaleDateString("es-MX")}\n`;
  t += `— — — — — — — — —\n`;
  partidas.forEach((p) => {
    t += `${SERVICIOS[p.servicio].icono} ${p.nombre || p.desc}\n`;
    if (p.nombre) t += `   ${p.desc}\n`;
    t += `   ${fmt(pv(p))}\n`;
  });
  t += `— — — — — — — — —\n`;
  t += `*TOTAL (${tier}): ${fmt(total)}*\n`;
  t += `Anticipo 50%: ${fmt(total * 0.5)}\n`;
  t += `\n_Precio sujeto a confirmación de medidas y diseño final._`;
  return t;
}

/* ===================== FORM: DTF (multi-impresión) ===================== */
function FormDTF({ onAdd, materialesDTF, configProduccion, tarifaHr }) {
  const disenos = Object.keys(DISENOS_DTF);
  const [sustrato, setSustrato] = useState((materialesDTF[0] && materialesDTF[0].nombre) || "");
  const [genero, setGenero] = useState("Hombre");
  const [talla, setTalla] = useState("M");
  const [cant, setCant] = useState(10);
  const [tipoDiseno, setTipoDiseno] = useState("proporcionado");
  const [imps, setImps] = useState([{ id: nid(), diseno: "Espalda Full Size", custom: false, w: 0, h: 0 }]);
  const [nd, setNd] = useState("Frontal Logo"), [nCustom, setNCustom] = useState(false), [nw, setNw] = useState(10), [nh, setNh] = useState(10);
  const medidaDe = (imp) => (imp.custom ? [Number(imp.w), Number(imp.h)] : DISENOS_DTF[imp.diseno][genero][talla]);

  const r = useMemo(() => {
    const matObj = materialesDTF.find((m) => m.nombre === sustrato) || materialesDTF[0] || { precio: 0 };
    const costoSus = matObj.precio;
    const DTF_CM2 = configProduccion.dtfPrecioMetro / (configProduccion.dtfAnchoCm * 100);
    let costoImp = 0;
    imps.forEach((imp) => { const [w, h] = medidaDe(imp); costoImp += Math.ceil(w * h) * DTF_CM2; });
    const pack = PACK_TALLA[talla] || 2.5;
    const costoPlanchado = (Number(configProduccion.tiempoPlanchadoMin) / 60) * tarifaHr;
    const porPieza = costoSus + costoImp + costoPlanchado * imps.length + pack;
    let manip = Number(configProduccion.manipProporc);
    if (tipoDiseno === "sencillo") manip = (Number(configProduccion.disenoSencilloMin) / 60) * tarifaHr;
    if (tipoDiseno === "complejo") manip = (Number(configProduccion.disenoComplejoMin) / 60) * tarifaHr;
    const ubic = imps.map((i) => (i.custom ? "pers." : i.diseno.replace("Frontal ", "").replace("Espalda ", "Esp."))).join(" + ");
    return { costo: porPieza * cant + manip, cant, desc: `${sustrato} (${talla}) · ${ubic}` };
  }, [sustrato, genero, talla, cant, tipoDiseno, imps, materialesDTF, configProduccion, tarifaHr]);

  return (
    <>
      <div style={{ display: "grid", gridTemplateColumns: "1.6fr 1fr", gap: 8 }}>
        <div><label className="cz-lbl">Sustrato</label><select className="cz-in" value={sustrato} onChange={(e) => setSustrato(e.target.value)}>{materialesDTF.map((s) => <option key={s.id}>{s.nombre}</option>)}</select></div>
        <div><label className="cz-lbl">Cantidad</label><input className="cz-in" type="number" value={cant} onChange={(e) => setCant(Number(e.target.value))} /></div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginTop: 10 }}>
        <div><label className="cz-lbl">Género</label><select className="cz-in" value={genero} onChange={(e) => setGenero(e.target.value)}><option>Hombre</option><option>Mujer</option></select></div>
        <div><label className="cz-lbl">Talla</label><select className="cz-in" value={talla} onChange={(e) => setTalla(e.target.value)}>{["S","M","L","XL"].map((t) => <option key={t}>{t}</option>)}</select></div>
      </div>
      <label className="cz-lbl" style={{ marginTop: 14 }}>Impresiones en esta prenda ({imps.length})</label>
      {imps.map((imp) => { const [w, h] = medidaDe(imp); return (
        <div className="imp" key={imp.id}>
          <span style={{ flex: 1, fontWeight: 600 }}>{imp.custom ? "Personalizada" : imp.diseno}</span>
          <span className="cz-m" style={{ color: "#7B8290" }}>{w}×{h}cm · {Math.ceil(w * h)}cm²</span>
          {imps.length > 1 && <button onClick={() => setImps(imps.filter((x) => x.id !== imp.id))} style={{ border: "none", background: "none", color: "#C0392B", cursor: "pointer", fontSize: 16 }}>×</button>}
        </div>
      ); })}
      <div style={{ border: "1.5px dashed #D8DBE0", borderRadius: 8, padding: 10, marginTop: 4 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
          <span className="cz-lbl" style={{ margin: 0 }}>+ Otra impresión</span>
          <label style={{ fontSize: 11, display: "flex", gap: 4, alignItems: "center", cursor: "pointer" }}><input type="checkbox" checked={nCustom} onChange={(e) => setNCustom(e.target.checked)} /> personalizada</label>
        </div>
        {!nCustom ? <select className="cz-in" value={nd} onChange={(e) => setNd(e.target.value)}>{disenos.map((d) => <option key={d}>{d}</option>)}</select>
          : <div style={{ display: "flex", gap: 8 }}><input className="cz-in" type="number" placeholder="ancho" value={nw} onChange={(e) => setNw(e.target.value)} /><input className="cz-in" type="number" placeholder="alto" value={nh} onChange={(e) => setNh(e.target.value)} /></div>}
        <button className="cz-btn" style={{ width: "100%", marginTop: 8, padding: 8 }} onClick={() => setImps([...imps, { id: nid(), diseno: nd, custom: nCustom, w: nw, h: nh }])}>Añadir impresión a la prenda</button>
      </div>
      <label className="cz-lbl" style={{ marginTop: 12 }}>Diseño (manipulación)</label>
      <div style={{ display: "flex", gap: 8 }}>
        {[["proporcionado", "Lo trae el cliente"], ["sencillo", "Propio sencillo"], ["complejo", "Propio complejo"]].map(([k, t]) => (
          <div key={k} className={"tierbox" + (tipoDiseno === k ? " on" : "")} onClick={() => setTipoDiseno(k)} style={{ fontSize: 12 }}>{t}</div>
        ))}
      </div>
      <PieForm costo={r.costo} desc={`${imps.length} impresión(es) · ${cant} pz`} onAdd={() => onAdd(r)} color={SERVICIOS.DTF.color} />
    </>
  );
}

/* ===================== FORM: DTF UV (objetos) ===================== */
function FormUV({ onAdd, materialesUV, configProduccion }) {
  const primero = materialesUV[0] || { id: 0, w: 10, h: 10, precio: 0 };
  const [objId, setObjId] = useState(primero.id);
  const [w, setW] = useState(primero.w);
  const [h, setH] = useState(primero.h);
  const [sus, setSus] = useState(primero.precio);
  const [cant, setCant] = useState(1);
  const cambiarObj = (id) => {
    const o = materialesUV.find((m) => m.id === Number(id));
    if (!o) return;
    setObjId(o.id); setW(o.w); setH(o.h); setSus(o.precio);
  };
  const r = useMemo(() => {
    const UV_CM2 = configProduccion.uvPrecioMetro / (configProduccion.uvAnchoCm * 100);
    const area = Math.ceil(Number(w) * Number(h));
    const costo = (Number(sus) + area * UV_CM2) * cant;
    const objName = (materialesUV.find((m) => m.id === objId) || {}).nombre || "Objeto";
    return { costo, cant, desc: `${objName} · UV ${w}×${h}cm ×${cant}` };
  }, [objId, w, h, sus, cant, materialesUV, configProduccion]);
  return (
    <>
      <label className="cz-lbl">Objeto a decorar</label>
      <select className="cz-in" value={objId} onChange={(e) => cambiarObj(e.target.value)}>{materialesUV.map((o) => <option key={o.id} value={o.id}>{o.nombre}</option>)}</select>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8, marginTop: 10 }}>
        <div><label className="cz-lbl">Ancho cm</label><input className="cz-in" type="number" value={w} onChange={(e) => setW(e.target.value)} /></div>
        <div><label className="cz-lbl">Alto cm</label><input className="cz-in" type="number" value={h} onChange={(e) => setH(e.target.value)} /></div>
        <div><label className="cz-lbl">Sustrato $</label><input className="cz-in" type="number" value={sus} onChange={(e) => setSus(e.target.value)} /></div>
        <div><label className="cz-lbl">Cantidad</label><input className="cz-in" type="number" value={cant} onChange={(e) => setCant(Number(e.target.value))} /></div>
      </div>
      <div style={{ fontSize: 12, color: "#7B8290", marginTop: 8 }}>Área "full wrap" precargada por objeto · editable. Film UV: ${(configProduccion.uvPrecioMetro / (configProduccion.uvAnchoCm * 100)).toFixed(3)}/cm².</div>
      <PieForm costo={r.costo} desc={`${(materialesUV.find((m) => m.id === objId) || {}).nombre || ""} ×${cant}`} onAdd={() => onAdd(r)} color={SERVICIOS.UV.color} />
    </>

}

/* ===================== FORM: SUBLIMACIÓN (flexible) ===================== */
function FormSubli({ onAdd, materialesSublimado, configProduccion }) {
  const primero = materialesSublimado[0] || { id: 0, w: 10, h: 10, ancho: 2.5, continuo: false, precio: 0 };
  const [prodId, setProdId] = useState(primero.id);
  const [w, setW] = useState(primero.w || 10), [h, setH] = useState(primero.h || 10);
  const [ancho, setAncho] = useState(primero.ancho || 2.5);
  const [cant, setCant] = useState(primero.continuo ? 10 : 12);
  const [sus, setSus] = useState(primero.precio);
  const cambiar = (id) => {
    const d = materialesSublimado.find((m) => m.id === Number(id));
    if (!d) return;
    setProdId(d.id); setW(d.w || 10); setH(d.h || 10); setAncho(d.ancho || 2.5); setSus(d.precio); setCant(d.continuo ? 10 : 12);
  };
  const r = useMemo(() => {
    const prod = materialesSublimado.find((m) => m.id === prodId) || primero;
    const continuo = prod.continuo;
    const areaUnit = continuo ? Number(ancho) * 100 : Number(w) * Number(h);
    const areaTot = areaUnit * cant;
    const costoImp = (areaTot / configProduccion.subliArea) * configProduccion.subliMetro;
    const costo = Number(sus) * cant + costoImp;
    const u = continuo ? `${cant}m × ${ancho}cm` : `${w}×${h}cm ×${cant}`;
    return { costo, cant, desc: `${prod.nombre || ""} · ${u}` };
  }, [prodId, w, h, ancho, cant, sus, materialesSublimado, configProduccion]);
  const prodActual = materialesSublimado.find((m) => m.id === prodId) || primero;
  const continuo = prodActual.continuo;
  return (
    <>
      <label className="cz-lbl">Producto</label>
      <select className="cz-in" value={prodId} onChange={(e) => cambiar(e.target.value)}>{materialesSublimado.map((p) => <option key={p.id} value={p.id}>{p.nombre}</option>)}</select>
      {continuo ? (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginTop: 10 }}>
          <div><label className="cz-lbl">Metros</label><input className="cz-in" type="number" value={cant} onChange={(e) => setCant(Number(e.target.value))} /></div>
          <div><label className="cz-lbl">Ancho cinta cm</label><input className="cz-in" type="number" value={ancho} onChange={(e) => setAncho(e.target.value)} /></div>
          <div><label className="cz-lbl">$ listón / m</label><input className="cz-in" type="number" value={sus} onChange={(e) => setSus(e.target.value)} /></div>
        </div>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8, marginTop: 10 }}>
          <div><label className="cz-lbl">Cantidad</label><input className="cz-in" type="number" value={cant} onChange={(e) => setCant(Number(e.target.value))} /></div>
          <div><label className="cz-lbl">Ancho cm</label><input className="cz-in" type="number" value={w} onChange={(e) => setW(e.target.value)} /></div>
          <div><label className="cz-lbl">Alto cm</label><input className="cz-in" type="number" value={h} onChange={(e) => setH(e.target.value)} /></div>
          <div><label className="cz-lbl">Sustrato $</label><input className="cz-in" type="number" value={sus} onChange={(e) => setSus(e.target.value)} /></div>
        </div>
      )}
      <div style={{ fontSize: 12, color: "#7B8290", marginTop: 8 }}>Impresión proporcional a tu hoja de sublimación (ver Insumos → Producción). El listón calcula el transfer que gastas por metro.</div>
      <PieForm costo={r.costo} desc={r.desc} onAdd={() => onAdd(r)} color={SERVICIOS.SUBLI.color} />
    </>
  );
}

/* ===================== FORM: LÁSER ===================== */
function FormLaser({ onAdd, materialesLaser, costosPorHora, tarifaHr }) {
  const [matIdx, setMatIdx] = useState(Math.min(4, materialesLaser.length - 1)), [cant, setCant] = useState(1), [minMaquina, setMinMaquina] = useState(8);
  const [disenoPropio, setDisenoPropio] = useState(false), [minDiseno, setMinDiseno] = useState(10);
  const r = useMemo(() => {
    const mat = materialesLaser[matIdx] || materialesLaser[0] || { nombre: "", precio: 0 };
    const costoMaquinaHr = costosPorHora.generalPorHora + costosPorHora.cncPorHora;
    const costo = mat.precio * cant + (Number(minMaquina) / 60) * costoMaquinaHr * cant + (disenoPropio ? (Number(minDiseno) / 60) * tarifaHr : 0);
    return { costo, cant, desc: `${mat.nombre} ×${cant}${disenoPropio ? " (diseño propio)" : ""}` };
  }, [matIdx, cant, minMaquina, disenoPropio, minDiseno, materialesLaser, costosPorHora, tarifaHr]);
  return (
    <>
      <label className="cz-lbl">Material</label>
      <select className="cz-in" value={matIdx} onChange={(e) => setMatIdx(Number(e.target.value))}>{materialesLaser.map((m, i) => <option key={m.id} value={i}>{m.nombre} — {fmt(m.precio)}</option>)}</select>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginTop: 10 }}>
        <div><label className="cz-lbl">Cantidad</label><input className="cz-in" type="number" value={cant} onChange={(e) => setCant(Number(e.target.value))} /></div>
        <div><label className="cz-lbl">Min máquina</label><input className="cz-in" type="number" value={minMaquina} onChange={(e) => setMinMaquina(e.target.value)} /></div>
      </div>
      <label style={{ fontSize: 13, display: "flex", gap: 6, alignItems: "center", marginTop: 12, cursor: "pointer" }}><input type="checkbox" checked={disenoPropio} onChange={(e) => setDisenoPropio(e.target.checked)} /> El diseño lo hago yo (+ mi tiempo)</label>
      {disenoPropio && <div style={{ marginTop: 8 }}><label className="cz-lbl">Min de diseño</label><input className="cz-in" type="number" value={minDiseno} onChange={(e) => setMinDiseno(e.target.value)} /></div>}
      <div style={{ fontSize: 11, color: "#7B8290", marginTop: 8 }}>Incluye luz/renta/CNC prorrateados: {fmt(costosPorHora.generalPorHora + costosPorHora.cncPorHora)}/hora de máquina.</div>
      <PieForm costo={r.costo} desc={`Láser ×${cant}`} onAdd={() => onAdd(r)} color={SERVICIOS.LASER.color} />
    </>
  );
}

/* ===================== FORM: CORTADORES DE GALLETA (precio fijo) ===================== */
function FormCortadores({ onAdd, cortadores }) {
  const [idx, setIdx] = useState(Math.min(2, cortadores.length - 1)), [cant, setCant] = useState(3), [conSello, setConSello] = useState(true);
  const r = useMemo(() => {
    const c = cortadores[idx] || cortadores[0] || { rango: "", base: 0, descMin: null, descPrecio: null };
    let unit = c.base;
    if (c.descMin && cant >= c.descMin) unit = c.descPrecio;
    if (!conSello) unit = unit * 0.6;
    let promo = null;
    if (c.descMin) {
      if (cant < c.descMin) {
        const faltan = c.descMin - cant;
        let precioProm = c.descPrecio;
        if (!conSello) precioProm = precioProm * 0.6;
        promo = `🎁 Agrega ${faltan} pieza${faltan > 1 ? "s" : ""} más y cada una te sale en ${fmt(precioProm)} (llevando ${c.descMin})`;
      } else {
        promo = `✅ Ya tienes el mejor precio por volumen: ${fmt(unit)} c/u`;
      }
    }
    return { esFijo: true, precioFijo: unit * cant, cant, desc: `Cortador ${c.rango} ${conSello ? "+sello" : "(solo)"} ×${cant}`, promo };
  }, [idx, cant, conSello, cortadores]);
  return (
    <>
      <label className="cz-lbl">Tamaño</label>
      <select className="cz-in" value={idx} onChange={(e) => setIdx(Number(e.target.value))}>{cortadores.map((c, i) => <option key={c.id} value={i}>{c.rango} — {fmt(c.base)}{c.descMin ? ` (${c.descMin}+ → ${fmt(c.descPrecio)})` : ""}</option>)}</select>
      <div style={{ marginTop: 10 }}><label className="cz-lbl">Cantidad</label><input className="cz-in" type="number" value={cant} onChange={(e) => setCant(Number(e.target.value))} /></div>
      <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
        <div className={"tierbox" + (conSello ? " on" : "")} onClick={() => setConSello(true)} style={{ fontSize: 12 }}>Cortador + sello<br /><span className="cz-m" style={{ fontSize: 11, color: "#7B8290" }}>100%</span></div>
        <div className={"tierbox" + (!conSello ? " on" : "")} onClick={() => setConSello(false)} style={{ fontSize: 12 }}>Solo cortador<br /><span className="cz-m" style={{ fontSize: 11, color: "#7B8290" }}>60%</span></div>
      </div>
      <div style={{ fontSize: 11, color: "#7B8290", marginTop: 8 }}>🎨 El diseño siempre está incluido, nunca se cobra aparte.</div>
      {r.promo && <div style={{ fontSize: 12, color: "#2EA84F", marginTop: 8 }}>{r.promo}</div>}
      <PieForm costo={r.precioFijo} desc={r.desc} onAdd={() => onAdd(r)} color={SERVICIOS.TRESD.color} fijo />
    </>
  );
}

/* ===================== FORM: PINES (precio fijo por cantidad) ===================== */
function FormPines({ onAdd, pines }) {
  const [cant, setCant] = useState(20);
  const ordenados = useMemo(() => [...pines].sort((a, b) => a.min - b.min), [pines]);
  const r = useMemo(() => {
    const cantNum = Number(cant) || 0;
    let tier = ordenados[0] || { precioPz: 0, min: 1 };
    ordenados.forEach((t) => { if (cantNum >= t.min) tier = t; });
    const unit = tier.precioPz;
    const idxActual = ordenados.indexOf(tier);
    const siguiente = ordenados[idxActual + 1];
    let promo = null;
    if (siguiente && cantNum < siguiente.min) {
      const faltan = siguiente.min - cantNum;
      promo = `🎁 Agrega ${faltan} pin${faltan > 1 ? "es" : ""} más y cada uno te sale en ${fmt(siguiente.precioPz)} (llevando ${siguiente.min})`;
    } else if (!siguiente && ordenados.length) {
      promo = `✅ Ya tienes el mejor precio por volumen: ${fmt(unit)} c/u`;
    }
    return { esFijo: true, precioFijo: unit * cantNum, cant: cantNum, desc: `Pines metálicos ×${cantNum}`, promo };
  }, [cant, ordenados]);
  return (
    <>
      <label className="cz-lbl">Cantidad de pines</label>
      <input className="cz-in" type="number" value={cant} onChange={(e) => setCant(e.target.value)} />
      <div style={{ fontSize: 11, color: "#7B8290", marginTop: 10, display: "flex", flexDirection: "column", gap: 2 }}>
        {ordenados.map((t) => <div key={t.id}>{t.rango}: {fmt(t.precioPz)} c/u</div>)}
      </div>
      <div style={{ fontSize: 11, color: "#7B8290", marginTop: 8 }}>🎨 Diseño incluido, sin costo extra.</div>
      {r.promo && <div style={{ fontSize: 12, color: "#2EA84F", marginTop: 8 }}>{r.promo}</div>}
      <PieForm costo={r.precioFijo} desc={r.desc} onAdd={() => onAdd(r)} color={SERVICIOS.PINES.color} fijo />
    </>
  );
}

/* ===================== FORM: IMPRESIÓN 3D ===================== */
function FormImpresion3D({ onAdd, filamentos, costosPorHora, tarifaHr }) {
  const primero = filamentos[0] || { id: 0, nombre: "", precio: 0 };
  const [filId, setFilId] = useState(primero.id);
  const [gramos, setGramos] = useState(50);
  const [horas, setHoras] = useState(2);
  const [cant, setCant] = useState(1);
  const [postProceso, setPostProceso] = useState("ninguno");
  const r = useMemo(() => {
    const fil = filamentos.find((f) => f.id === filId) || primero;
    const costoFilamento = (Number(gramos) / 1000) * fil.precio;
    const costoMaquinaHr = costosPorHora.generalPorHora + costosPorHora.impresora3dPorHora;
    const costoMaquina = Number(horas) * costoMaquinaHr;
    const costoPost = (POST_PROCESO_3D[postProceso].min / 60) * tarifaHr;
    const costoPorPieza = costoFilamento + costoMaquina + costoPost;
    const cantNum = Number(cant) || 1;
    return { costo: costoPorPieza * cantNum, cant: cantNum, desc: `${fil.nombre} · ${gramos}g · ${horas}h ×${cantNum}${postProceso !== "ninguno" ? " + acabado" : ""}` };
  }, [filId, gramos, horas, cant, postProceso, filamentos, costosPorHora, tarifaHr]);
  return (
    <>
      <label className="cz-lbl">Filamento</label>
      <select className="cz-in" value={filId} onChange={(e) => setFilId(Number(e.target.value))}>{filamentos.map((f) => <option key={f.id} value={f.id}>{f.nombre} — {fmt(f.precio)}/kg</option>)}</select>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginTop: 10 }}>
        <div><label className="cz-lbl">Gramos (pieza)</label><input className="cz-in" type="number" value={gramos} onChange={(e) => setGramos(e.target.value)} /></div>
        <div><label className="cz-lbl">Horas de impresión</label><input className="cz-in" type="number" value={horas} onChange={(e) => setHoras(e.target.value)} /></div>
        <div><label className="cz-lbl">Cantidad</label><input className="cz-in" type="number" value={cant} onChange={(e) => setCant(Number(e.target.value))} /></div>
      </div>
      <label className="cz-lbl" style={{ marginTop: 12 }}>Post-procesado</label>
      <div style={{ display: "flex", gap: 8 }}>
        {Object.entries(POST_PROCESO_3D).map(([k, v]) => (
          <div key={k} className={"tierbox" + (postProceso === k ? " on" : "")} onClick={() => setPostProceso(k)} style={{ fontSize: 12 }}>{v.label}</div>
        ))}
      </div>
      <div style={{ fontSize: 11, color: "#7B8290", marginTop: 8 }}>Incluye luz/renta/impresora prorrateados: {fmt(costosPorHora.generalPorHora + costosPorHora.impresora3dPorHora)}/hora de impresión.</div>
      <PieForm costo={r.costo} desc={r.desc} onAdd={() => onAdd(r)} color={SERVICIOS.IMP3D.color} />
    </>
  );
}

/* ===================== VISTA COTIZAR ===================== */
function VistaCotizar({ mults, modoMargen, clientes, onGuardarHistorial, insumos }) {
  const [svc, setSvc] = useState("DTF");
  const [tier, setTier] = useState(Object.keys(mults)[0] || "Cliente final");
  const [refPedido, setRefPedido] = useState("");
  const [clienteSel, setClienteSel] = useState("");
  const [nombrePartida, setNombrePartida] = useState("");
  const [partidas, setPartidas] = useState([]);
  const [guardadoOk, setGuardadoOk] = useState(false);

  const add = (p) => { setPartidas((prev) => [...prev, { ...p, id: nid(), servicio: svc, nombre: nombrePartida.trim() }]); setNombrePartida(""); };
  const forms = {
    DTF: <FormDTF onAdd={add} materialesDTF={insumos.materiales.dtf} configProduccion={insumos.configProduccion} tarifaHr={insumos.manoObra.tarifaHr} />,
    UV: <FormUV onAdd={add} materialesUV={insumos.materiales.uv} configProduccion={insumos.configProduccion} />,
    SUBLI: <FormSubli onAdd={add} materialesSublimado={insumos.materiales.sublimado} configProduccion={insumos.configProduccion} />,
    LASER: <FormLaser onAdd={add} materialesLaser={insumos.materiales.laser} costosPorHora={insumos.costosPorHora} tarifaHr={insumos.manoObra.tarifaHr} />,
    TRESD: <FormCortadores onAdd={add} cortadores={insumos.preciosFijos.cortadores} />,
    PINES: <FormPines onAdd={add} pines={insumos.preciosFijos.pines} />,
    IMP3D: <FormImpresion3D onAdd={add} filamentos={insumos.materiales.filamento3d} costosPorHora={insumos.costosPorHora} tarifaHr={insumos.manoObra.tarifaHr} />,
  };

  const total = partidas.reduce((s, p) => s + (p.esFijo ? p.precioFijo : precio(p.costo, mults[tier], modoMargen)), 0);

  const seleccionarCliente = (id) => {
    setClienteSel(id);
    const c = clientes.find((c) => String(c.id) === id);
    if (c) {
      setRefPedido(c.nombre);
      if (mults[c.tipoCliente] !== undefined) setTier(c.tipoCliente);
    }
  };

  const handleWhatsApp = () => {
    const texto = generarTextoTicket(partidas, tier, mults, modoMargen, refPedido);
    window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`, "_blank");
  };

  const handleGuardar = () => {
    const texto = generarTextoTicket(partidas, tier, mults, modoMargen, refPedido);
    onGuardarHistorial({ id: nid(), fecha: new Date().toLocaleString("es-MX"), refPedido, tier, total, texto, partidas });
    setGuardadoOk(true);
    setTimeout(() => setGuardadoOk(false), 2000);
  };

  const handleImprimir = () => {
    const texto = generarTextoTicket(partidas, tier, mults, modoMargen, refPedido).replace(/\*/g, "");
    const w = window.open("", "_blank", "width=380,height=640");
    if (w) {
      w.document.write(`<pre style="font-family:'IBM Plex Mono',monospace;font-size:12px;white-space:pre-wrap;width:58mm;padding:8px;margin:0;">${texto}</pre>`);
      w.document.close();
      w.focus();
      w.print();
    }
  };

  return (
    <div className="cz-grid" style={{ display: "grid", gridTemplateColumns: "1.1fr .9fr", gap: 16, alignItems: "start" }}>
      <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
        {clientes.length > 0 && (
          <div className="cz-card">
            <label className="cz-lbl">Cliente (opcional)</label>
            <select className="cz-in" value={clienteSel} onChange={(e) => seleccionarCliente(e.target.value)}>
              <option value="">Sin cliente</option>
              {clientes.map((c) => <option key={c.id} value={c.id}>{EMOJI_TIER[c.tipoCliente] || ""} {c.nombre}</option>)}
            </select>
          </div>
        )}
        <div className="cz-card">
          <label className="cz-lbl">Cliente / referencia del pedido (sale en el ticket de envío)</label>
          <input className="cz-in" placeholder="Ej. Caro — Evento XV Sofía" value={refPedido} onChange={(e) => setRefPedido(e.target.value)} />
        </div>
        <div className="cz-card">
          <label className="cz-lbl">Agregar partida — servicio</label>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
            {Object.entries(SERVICIOS).map(([k, s]) => (
              <button key={k} className={"svc" + (svc === k ? " on" : "")} style={svc === k ? { background: s.color } : {}} onClick={() => setSvc(k)}><span style={{ fontSize: 18 }}>{s.icono}</span>{s.nombre}</button>
            ))}
          </div>
          <label className="cz-lbl" style={{ marginTop: 12 }}>Nombre/etiqueta de esta partida (opcional)</label>
          <input className="cz-in" placeholder="Ej. Playera de Juan" value={nombrePartida} onChange={(e) => setNombrePartida(e.target.value)} />
        </div>
        <div className="cz-card" key={svc}>{forms[svc]}</div>
        <div className="cz-card">
          <label className="cz-lbl">Tipo de cliente (aplica a toda la cotización)</label>
          <div style={{ display: "flex", gap: 8 }}>
            {Object.keys(mults).map((t) => (
              <div key={t} className={"tierbox" + (tier === t ? " on" : "")} onClick={() => setTier(t)}>
                <div className="cz-d" style={{ fontSize: 13, fontWeight: 700 }}>{t}</div><div className="cz-m" style={{ fontSize: 11, color: "#7B8290" }}>{Math.round(mults[t] * 100)}%</div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div style={{ position: "sticky", top: 12 }}>
        <TicketCarrito partidas={partidas} tier={tier} mults={mults} modoMargen={modoMargen} refPedido={refPedido} onRemove={(id) => setPartidas(partidas.filter((p) => p.id !== id))} />
        {partidas.length > 0 && (<>
          <button className="cz-btn" style={{ width: "100%", marginTop: 10, background: "#25D366" }} onClick={handleWhatsApp}>📲 Enviar por WhatsApp</button>
          <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
            <button className="cz-btn" style={{ flex: 1 }} onClick={handleImprimir}>🖨 Ticket 58mm</button>
            <button className="cz-btn org" style={{ flex: 1 }} onClick={handleGuardar}>{guardadoOk ? "✅ Guardado" : "💾 Guardar"}</button>
          </div>
        </>)}
      </div>
    </div>
  );
}

function TicketCarrito({ partidas, tier, mults, modoMargen, refPedido, onRemove }) {
  const pv = (p) => (p.esFijo ? p.precioFijo : precio(p.costo, mults[tier], modoMargen));
  const total = partidas.reduce((s, p) => s + pv(p), 0);
  const totalCon = (t) => partidas.reduce((s, p) => s + (p.esFijo ? p.precioFijo : precio(p.costo, mults[t], modoMargen)), 0);
  if (partidas.length === 0) return <div className="ticket"><div style={{ textAlign: "center", color: "#9AA0AE", padding: "30px 10px", fontSize: 13 }}>Agrega partidas y se irán sumando aquí.<br /><br />Ej: vaso + DTF UV full, un listón de 10m, y unas playeras — todo en una cotización.</div></div>;
  return (
    <div className="ticket">
      <div style={{ textAlign: "center", fontWeight: 600, fontSize: 14 }}>EL MERCHENARIO</div>
      {refPedido && <div className="refbox">{refPedido}</div>}

/* ===================== VISTA COTIZACIÓN INVERSA ===================== */
function VistaInversa({ mults, modoMargen }) {
  const [precioRef, setPrecioRef] = useState("");
  const [modoPrecio, setModoPrecio] = useState("total");
  const [cantidadRef, setCantidadRef] = useState(1);
  const [notaRef, setNotaRef] = useState("");
  const [copied, setCopied] = useState(false);

  const r = useMemo(() => {
    const precioNum = Number(precioRef) || 0;
    const cantNum = Number(cantidadRef) || 1;
    const precioPorPieza = modoPrecio === "pieza" ? precioNum : precioNum / cantNum;
    const filas = Object.keys(mults).map((t) => {
      const pct = mults[t];
      const costoMax = modoMargen === "venta" ? precioPorPieza * (1 - pct) : precioPorPieza / (1 + pct);
      const ganancia = precioPorPieza - costoMax;
      return { tier: t, costoMax, ganancia, pct };
    });
    return { precioPorPieza, filas, cantNum };
  }, [precioRef, modoPrecio, cantidadRef, mults, modoMargen]);

  const textoResumen = () => {
    let t = `🔄 *COTIZACIÓN INVERSA*\n`;
    if (notaRef) t += `📎 Referencia: ${notaRef}\n`;
    t += `💵 Precio visto: ${fmt(r.precioPorPieza)} por pieza`;
    t += modoPrecio === "total" ? ` (total ${fmt(Number(precioRef) || 0)} ÷ ${r.cantNum} pz)\n` : ` (precio directo por pieza)\n`;
    t += `— — — — — — — — —\n`;
    r.filas.forEach((f) => {
      t += `${EMOJI_TIER[f.tier] || ""} ${f.tier}: costo máx ${fmt(f.costoMax)}/pz (ganancia ${fmt(f.ganancia)}/pz)\n`;
    });
    t += `— — — — — — — — —\n`;
    t += `_Si tu costo real por pieza es menor a estos montos, puedes igualar o mejorar este precio con ganancia._`;
    return t;
  };

  const copiar = () => {
    navigator.clipboard.writeText(textoResumen());
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };

  return (
    <div style={{ maxWidth: 620, display: "flex", flexDirection: "column", gap: 14 }}>
      <div className="cz-card">
        <span className="cz-d" style={{ fontSize: 18, fontWeight: 700, textTransform: "uppercase" }}>Cotización inversa</span>
        <div style={{ fontSize: 12, color: "#7B8290", marginTop: 6 }}>Encontraste una publicación parecida a lo que vas a cotizar y quieres saber cuánto te podría costar cada pieza para igualar ese precio y aún ganar.</div>
      </div>
      <div className="cz-card">
        <label className="cz-lbl">¿Qué es lo que viste? (opcional, solo referencia)</label>
        <input className="cz-in" placeholder="Ej. Cortador de galleta 8cm en Facebook Marketplace" value={notaRef} onChange={(e) => setNotaRef(e.target.value)} />
      </div>
      <div className="cz-card">
        <label className="cz-lbl">¿El precio que viste es total o por pieza?</label>
        <div style={{ display: "flex", gap: 8 }}>
          <div className={"tierbox" + (modoPrecio === "total" ? " on" : "")} onClick={() => setModoPrecio("total")}>Precio total del pedido</div>
          <div className={"tierbox" + (modoPrecio === "pieza" ? " on" : "")} onClick={() => setModoPrecio("pieza")}>Precio por pieza</div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: modoPrecio === "total" ? "1fr 1fr" : "1fr", gap: 8, marginTop: 10 }}>
          <div>
            <label className="cz-lbl">{modoPrecio === "total" ? "Precio total visto" : "Precio por pieza visto"}</label>
            <input className="cz-in" type="number" value={precioRef} onChange={(e) => setPrecioRef(e.target.value)} placeholder="$0.00" />
          </div>
          {modoPrecio === "total" && (
            <div>
              <label className="cz-lbl">Cantidad de piezas</label>
              <input className="cz-in" type="number" value={cantidadRef} onChange={(e) => setCantidadRef(e.target.value)} />
            </div>
          )}
        </div>
      </div>

      {precioRef && (
        <div className="ticket">
          <div style={{ textAlign: "center", fontWeight: 600, fontSize: 14 }}>COTIZACIÓN INVERSA</div>
          <div style={{ textAlign: "center", fontSize: 10.5, color: "#7B8290" }}>Precio por pieza de referencia: {fmt(r.precioPorPieza)}</div>
          <hr className="sep" />
          {r.filas.map((f) => (
            <div key={f.tier} className="trow" style={{ marginBottom: 4 }}>
              <span>{EMOJI_TIER[f.tier]} {f.tier} ({Math.round(f.pct * 100)}%)</span>
              <span className="cz-m">{fmt(f.costoMax)}/pz</span>
            </div>
          ))}
          <hr className="sep" />
          <div style={{ fontSize: 11, color: "#7B8290" }}>Ese es el costo máximo por pieza (material + tiempo + diseño) que puedes tener para igualar ese precio y quedarte con el margen de cada tier.</div>
        </div>
      )}

      {precioRef && (
        <button className="cz-btn org" onClick={copiar}>{copied ? "✅ Copiado" : "📋 Copiar resumen"}</button>
      )}
    </div>
  );
}

/* ===================== VISTA INSUMOS ===================== */
function VistaInsumos({ materiales, setMateriales, preciosFijos, setPreciosFijos, configProduccion, setConfigProduccion, costosOperativos, setCostosOperativos, costoMaquinas, setCostoMaquinas, manoObra, setManoObra, costosPorHora }) {
  const [categoriaActiva, setCategoriaActiva] = useState("laser");
  const CATEGORIAS = [
    ["laser", "🔥 Láser"], ["dtf", "👕 DTF"], ["sublimado", "☕ Sublimado"], ["uv", "✨ DTF UV"], ["filamento3d", "🧵 Filamento 3D"],
  ];

  const actualizarMaterial = (cat, id, campo, valor) => {
    setMateriales((prev) => ({ ...prev, [cat]: prev[cat].map((m) => (m.id === id ? { ...m, [campo]: campo === "nombre" ? valor : Number(valor), mod: hoy() } : m)) }));
  };
  const eliminarMaterial = (cat, id) => {
    setMateriales((prev) => ({ ...prev, [cat]: prev[cat].filter((m) => m.id !== id) }));
  };
  const agregarMaterial = (cat) => {
    const nombre = prompt("Nombre del nuevo insumo:");
    if (!nombre) return;
    const extra = cat === "uv" || cat === "sublimado" ? { w: 10, h: 10 } : {};
    setMateriales((prev) => ({ ...prev, [cat]: [...prev[cat], { id: nid(), nombre, precio: 0, unidad: "pieza", ...extra, mod: hoy() }] }));
  };

  const actualizarCortador = (id, campo, valor) => {
    setPreciosFijos((prev) => ({ ...prev, cortadores: prev.cortadores.map((c) => (c.id === id ? { ...c, [campo]: campo === "rango" ? valor : (valor === "" ? null : Number(valor)), mod: hoy() } : c)) }));
  };
  const actualizarPin = (id, campo, valor) => {
    setPreciosFijos((prev) => ({ ...prev, pines: prev.pines.map((p) => (p.id === id ? { ...p, [campo]: campo === "rango" ? valor : Number(valor), mod: hoy() } : p)) }));
  };

  const editarProduccion = (campo, valor) => setConfigProduccion((prev) => ({ ...prev, [campo]: Number(valor), mod: hoy() }));
  const editarOperativos = (campo, valor) => setCostosOperativos((prev) => ({ ...prev, [campo]: Number(valor), mod: hoy() }));
  const editarMaquinas = (campo, valor) => setCostoMaquinas((prev) => ({ ...prev, [campo]: Number(valor), mod: hoy() }));
  const editarManoObra = (campo, valor) => setManoObra((prev) => ({ ...prev, [campo]: Number(valor), mod: hoy() }));

  const totalOperativoMensual = costosOperativos.renta + costosOperativos.luz + costosOperativos.agua + costosOperativos.internet + costosOperativos.gasolina;

  return (
    <div style={{ maxWidth: 860, display: "flex", flexDirection: "column", gap: 14 }}>

          {CATEGORIAS.map(([k, t]) => (
            <button key={k} className={"svc" + (categoriaActiva === k ? " on" : "")} style={categoriaActiva === k ? { background: "#14161D" } : {}} onClick={() => setCategoriaActiva(k)}>{t}</button>
          ))}
        </div>
        <div style={{ marginTop: 14, display: "flex", flexDirection: "column", gap: 8 }}>
          {materiales[categoriaActiva].map((m) => (
            <div key={m.id} className="insumo-row">
              <input className="cz-in" style={{ flex: 2, minWidth: 140 }} value={m.nombre} onChange={(e) => actualizarMaterial(categoriaActiva, m.id, "nombre", e.target.value)} />
              <input className="cz-in" style={{ flex: 1, minWidth: 80 }} type="number" value={m.precio} onChange={(e) => actualizarMaterial(categoriaActiva, m.id, "precio", e.target.value)} />
              {m.w !== undefined && <input className="cz-in" style={{ width: 60 }} type="number" title="Ancho cm" value={m.w} onChange={(e) => actualizarMaterial(categoriaActiva, m.id, "w", e.target.value)} />}

              <span className="insumo-mod">Mod: {m.mod}</span>
              <button onClick={() => eliminarMaterial(categoriaActiva, m.id)} style={{ border: "none", background: "none", color: "#C0392B", cursor: "pointer", fontSize: 16 }}>×</button>

          <div><label className="cz-lbl">Luz</label><input className="cz-in" type="number" value={costosOperativos.luz} onChange={(e) => editarOperativos("luz", e.target.value)} /></div>
          <div><label className="cz-lbl">Agua</label><input className="cz-in" type="number" value={costosOperativos.agua} onChange={(e) => editarOperativos("agua", e.target.value)} /></div>
          <div><label className="cz-lbl">Internet</label><input className="cz-in" type="number" value={costosOperativos.internet} onChange={(e) => editarOperativos("internet", e.target.value)} /></div>
          <div><label className="cz-lbl">Gasolina</label><input className="cz-in" type="number" value={costosOperativos.gasolina} onChange={(e) => editarOperativos("gasolina", e.target.value)} /></div>
        </div>
        <div style={{ fontSize: 12, color: "#7B8290", marginTop: 10 }}>Total mensual: <b>{fmt(totalOperativoMensual)}</b> · Costo por hora (÷{HOURS_PER_MONTH}h): <b>{fmt(costosPorHora.generalPorHora)}</b></div>
        <div className="insumo-mod" style={{ marginTop: 4 }}>Mod: {costosOperativos.mod}</div>
      </div>

      <div className="cz-card">
        <span className="cz-d" style={{ fontSize: 18, fontWeight: 700, textTransform: "uppercase" }}>Costo por máquina (mensual)</span>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginTop: 10 }}>
          <div><label className="cz-lbl">CNC / Láser</label><input className="cz-in" type="number" value={costoMaquinas.cnc} onChange={(e) => editarMaquinas("cnc", e.target.value)} /></div>
          <div><label className="cz-lbl">Impresora 3D (amortizada)</label><input className="cz-in" type="number" value={costoMaquinas.impresora3d} onChange={(e) => editarMaquinas("impresora3d", e.target.value)} /></div>
        </div>
        <div style={{ fontSize: 12, color: "#7B8290", marginTop: 10 }}>CNC/Láser por hora: <b>{fmt(costosPorHora.cncPorHora)}</b> · Impresora 3D por hora: <b>{fmt(costosPorHora.impresora3dPorHora)}</b></div>
        <div className="insumo-mod" style={{ marginTop: 4 }}>Mod: {costoMaquinas.mod}</div>
      </div>

      <div className="cz-card">
        <span className="cz-d" style={{ fontSize: 18, fontWeight: 700, textTransform: "uppercase" }}>Mano de obra</span>
        <div style={{ maxWidth: 220, marginTop: 10 }}>
          <label className="cz-lbl">Tarifa por hora ($)</label>
          <input className="cz-in" type="number" value={manoObra.tarifaHr} onChange={(e) => editarManoObra("tarifaHr", e.target.value)} />
        </div>
        <div className="insumo-mod" style={{ marginTop: 8 }}>Mod: {manoObra.mod}</div>
      </div>
    </div>
  );
}

/* ===================== CONFIG ===================== */
function VistaConfig({ mults, setMults, modoMargen, setModoMargen }) {
  return (
    <div style={{ maxWidth: 540, display: "flex", flexDirection: "column", gap: 14 }}>
      <div className="cz-card">
        <span className="cz-d" style={{ fontSize: 18, fontWeight: 700, textTransform: "uppercase" }}>Tipo de margen</span>
        <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
          <div className={"tierbox" + (modoMargen === "markup" ? " on" : "")} onClick={() => setModoMargen("markup")}><b>Markup sobre costo</b><div className="cz-m" style={{ fontSize: 11, color: "#7B8290" }}>costo × (1+%)</div></div>
          <div className={"tierbox" + (modoMargen === "venta" ? " on" : "")} onClick={() => setModoMargen("venta")}><b>Margen sobre venta</b><div className="cz-m" style={{ fontSize: 11, color: "#7B8290" }}>costo ÷ (1−%)</div></div>
        </div>
      </div>
      <div className="cz-card">
        <span className="cz-d" style={{ fontSize: 18, fontWeight: 700, textTransform: "uppercase" }}>Ganancia por tier</span>
        {Object.keys(mults).map((t) => (
          <div key={t} style={{ marginTop: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ fontSize: 14, fontWeight: 600 }}>{t}</span><span className="cz-m" style={{ fontWeight: 600 }}>{Math.round(mults[t] * 100)}%</span></div>
            <input type="range" min="0.1" max="1" step="0.01" value={mults[t]} style={{ width: "100%", accentColor: "#F4561D" }} onChange={(e) => setMults({ ...mults, [t]: Number(e.target.value) })} />
          </div>
        ))}
      </div>
    </div>
  );
}

/* ===================== APP ===================== */
function App() {
  const [tab, setTab] = useState("cotizar");
  const [mults, setMults] = useState(() => loadLS("cz_mults", { ...TIERS }));
  const [modoMargen, setModoMargen] = useState(() => loadLS("cz_modoMargen", "markup"));
  const [clientes, setClientes] = useState(() => loadLS("cz_clientes", []));
  const [historial, setHistorial] = useState(() => loadLS("cz_historial", []));
  const [materiales, setMateriales] = useState(() => loadLS("cz_materiales", DEFAULT_MATERIALES));
  const [preciosFijos, setPreciosFijos] = useState(() => loadLS("cz_preciosFijos", DEFAULT_PRECIOS_FIJOS));
  const [configProduccion, setConfigProduccion] = useState(() => loadLS("cz_configProduccion", DEFAULT_CONFIG_PRODUCCION));
  const [costosOperativos, setCostosOperativos] = useState(() => loadLS("cz_costosOperativos", DEFAULT_COSTOS_OPERATIVOS));
  const [costoMaquinas, setCostoMaquinas] = useState(() => loadLS("cz_costoMaquinas", DEFAULT_COSTO_MAQUINAS));
  const [manoObra, setManoObra] = useState(() => loadLS("cz_manoObra", DEFAULT_MANO_OBRA));

  useEffect(() => saveLS("cz_mults", mults), [mults]);
  useEffect(() => saveLS("cz_modoMargen", modoMargen), [modoMargen]);
  useEffect(() => saveLS("cz_clientes", clientes), [clientes]);
  useEffect(() => saveLS("cz_historial", historial), [historial]);
  useEffect(() => saveLS("cz_materiales", materiales), [materiales]);
  useEffect(() => saveLS("cz_preciosFijos", preciosFijos), [preciosFijos]);
  useEffect(() => saveLS("cz_configProduccion", configProduccion), [configProduccion]);
  useEffect(() => saveLS("cz_costosOperativos", costosOperativos), [costosOperativos]);
  useEffect(() => saveLS("cz_costoMaquinas", costoMaquinas), [costoMaquinas]);
  useEffect(() => saveLS("cz_manoObra", manoObra), [manoObra]);

  const costosPorHora = useMemo(() => {
    const generalMensual = costosOperativos.renta + costosOperativos.luz + costosOperativos.agua + costosOperativos.internet + costosOperativos.gasolina;
    return {
      generalPorHora: generalMensual / HOURS_PER_MONTH,
      cncPorHora: costoMaquinas.cnc / HOURS_PER_MONTH,
      impresora3dPorHora: costoMaquinas.impresora3d / HOURS_PER_MONTH,
    };
  }, [costosOperativos, costoMaquinas]);

  const insumos = { materiales, preciosFijos, configProduccion, costosPorHora, manoObra };

  const agregarHistorial = (entry) => setHistorial((prev) => [entry, ...prev]);
  const eliminarHistorial = (id) => setHistorial((prev) => prev.filter((h) => h.id !== id));
  const limpiarHistorial = () => { if (confirm("¿Eliminar todo el historial?")) setHistorial([]); };

  const agregarCliente = (c) => setClientes((prev) => [...prev, c]);
  const eliminarCliente = (id) => { if (confirm("¿Eliminar este cliente?")) setClientes((prev) => prev.filter((c) => c.id !== id)); };

  const tabs = [
    ["cotizar", "⚡ Cotizar"],
    ["inversa", "🔄 Inversa"],
    ["clientes", "👥 Clientes"],
    ["historial", "🕐 Historial"],
    ["insumos", "📦 Insumos"],
    ["config", "⚙ Config"],
  ];

  return (
    <div className="cz">
      <style>{css}</style>
      <div className="cz-nav">
        <span className="cz-d" style={{ fontSize: 19, fontWeight: 700, color: "#fff", padding: "0 10px 0 4px", whiteSpace: "nowrap" }}>MRCH<span style={{ color: "#F4561D" }}>·</span>COTIZA</span>
        {tabs.map(([k, t]) => <button key={k} className={"cz-tab" + (tab === k ? " on" : "")} onClick={() => setTab(k)}>{t}</button>)}
        <a className="cz-extra" href="herreria.html">🔧 Herrería</a>
      </div>
      <div style={{ maxWidth: 1060, margin: "0 auto", padding: 16 }}>
        {tab === "cotizar" && <VistaCotizar mults={mults} modoMargen={modoMargen} clientes={clientes} onGuardarHistorial={agregarHistorial} insumos={insumos} />}
        {tab === "inversa" && <VistaInversa mults={mults} modoMargen={modoMargen} />}
        {tab === "clientes" && <VistaClientes clientes={clientes} onAgregar={agregarCliente} onEliminar={eliminarCliente} />}
        {tab === "historial" && <VistaHistorial historial={historial} onEliminar={eliminarHistorial} onLimpiar={limpiarHistorial} />}
        {tab === "insumos" && (
          <VistaInsumos
            materiales={materiales} setMateriales={setMateriales}
            preciosFijos={preciosFijos} setPreciosFijos={setPreciosFijos}
            configProduccion={configProduccion} setConfigProduccion={setConfigProduccion}
            costosOperativos={costosOperativos} setCostosOperativos={setCostosOperativos}
            costoMaquinas={costoMaquinas} setCostoMaquinas={setCostoMaquinas}
            manoObra={manoObra} setManoObra={setManoObra}
            costosPorHora={costosPorHora}
          />
        )}
        {tab === "config" && <VistaConfig mults={mults} setMults={setMults} modoMargen={modoMargen} setModoMargen={setModoMargen} />}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
<script>
(function () {
  var code = document.getElementById("app-source").textContent;
  var output = Babel.transform(code, { presets: [["react", { runtime: "classic" }]] }).code;
  var script = document.createElement("script");
  script.textContent = output;
  document.body.appendChild(script);
})();
</script>
</body>
</html>
